name: Schema Diff

on:
  pull_request:

permissions:
  contents: read

jobs:
  schema-diff:
    name: Schema stability guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run schema-diff
        # Compares live zod-derived tool schemas to schemas/snapshot.json.
        # Exits 0 if clean OR if CHANGELOG.md's Unreleased section mentions
        # every affected tool. Exits 1 on uncoordinated drift.
        run: npm run schema:diff
